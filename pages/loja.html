<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>VoltRide | Carrinho</title>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-volt">VOLT</span><span class="logo-ride">RIDE</span>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="./loja.html" class="ativo">Loja</a></li>
                <li><a href="./sobre.html">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main id="loja-main">

        <section id="carrinho-section">
            <h2>Carrinho de Compras</h2>
            <p class="section-sub">Revise seus itens antes de finalizar</p>

            <div id="lista-carrinho"></div>

            <div id="resumo">
                <div class="resumo-linha">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="resumo-linha destaque">
                    <span>Total da Compra</span>
                    <h2 id="total-compra">R$ 0,00</h2>
                </div>
                <div class="resumo-acoes">
                    <button id="btn-desconto" onclick="aplicarDesconto()">Aplicar 10% de desconto</button>
                    <button id="btn-finalizar" onclick="finalizarCompra()">Finalizar compra</button>
                </div>
                <p id="msg-desconto"></p>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 VoltRide — Todos os direitos reservados</p>
    </footer>

    <script src="../src/js/script.js"></script>

</body>
</html>
